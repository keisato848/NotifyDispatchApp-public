name: Build & Test

on:
  push:
    branches: [master, feature/*]
  pull_request:
    branches: [master]

# PRマージにはこのワークフローの成功が必須
# Settings > Branches > Branch protection rules で "Build & Test" を required に設定

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore

      # ビルドエラーがあればここで即失敗 → コミット/PRブロック
      - name: Build Tests Project
        run: dotnet build NotifyDispatchApp.Tests/NotifyDispatchApp.Tests.csproj -c Release --no-restore -warnaserror

      - name: Run Tests
        run: dotnet test NotifyDispatchApp.Tests/NotifyDispatchApp.Tests.csproj -c Release --no-build --verbosity normal --logger "trx;LogFileName=results.trx"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/results.trx'

      # Android ビルド（ビルドエラー検出）
      - name: Build Android
        run: dotnet build NotifyDispatchApp/NotifyDispatchApp.csproj -f net10.0-android -c Release --no-restore
